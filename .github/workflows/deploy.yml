name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- PARTIE TESTS ET PREPARATION ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install Backend dependencies
        working-directory: backend
        run: |
          composer install --no-interaction --prefer-dist
          cp .env.example .env
          php artisan key:generate
          php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # --- PARTIE DOCKER (AUTOMATISATION) ---
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          docker build -t mon-app-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t mon-app-frontend:latest ./frontend

      # Optionnel : Vérifier que tout démarre avec docker-compose
      - name: Docker Compose Check
        run: docker-compose up -d