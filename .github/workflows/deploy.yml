name: Deploy without DockerHub

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # aller dans dossier projet (ou clone si première fois)
            cd projet_formation || git clone https://github.com/${{ github.repository }} projet_formation
            cd projet_formation

            # récupérer dernière version
            git pull origin main

            # rebuild docker
            docker compose down
            docker compose up --build -d