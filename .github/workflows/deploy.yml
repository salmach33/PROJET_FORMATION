name: CI Docker Laravel + React

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build Docker backend
      - name: Build Backend
        run: docker build -t backend ./backend

      # 3. Build Docker frontend
      - name: Build Frontend
        run: docker build -t frontend ./frontend

      # 4. Lancer containers (test)
      - name: Run containers
        run: docker compose up -d

      # 5. Attendre un peu
      - name: Wait
        run: sleep 10

      # 6. Vérifier containers
      - name: Check containers
        run: docker ps

      # 7. Tester API Laravel
      - name: Test API
        run: curl http://localhost:8000/api/formations || echo "API not ready"